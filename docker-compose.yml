version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: lms-postgres
    restart: always
    environment:
      POSTGRES_USER: lms_app
      POSTGRES_PASSWORD: lms_secure_pass_2026
      POSTGRES_DB: lumina_lms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
